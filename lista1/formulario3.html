
<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sample Form - Parceiro</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <h2 class="mb-4">Cadastro de Parceiro</h2>

    <form>

        <!-- PRIMEIRA LINHA -->
        <div class="row mb-3">
            <div class="col">
                <label class="form-label">Nome do Parceiro</label>
                <input type="text" class="form-control">
            </div>

            <div class="col">
                <label class="form-label">E-mail do Parceiro</label>
                <input type="email" class="form-control">
            </div>
        </div>

        <!-- SEGUNDA LINHA -->
        <div class="row mb-3">
            <div class="col">
                <label class="form-label">Razão Social do Parceiro</label>
                <input type="text" class="form-control">
            </div>

            <div class="col">
                <label class="form-label">Celular do Parceiro</label>
                <input type="text" class="form-control">
            </div>
        </div>

        <!-- TERCEIRA LINHA (ENDEREÇO OCUPA DUAS COLUNAS) -->
        <div class="row mb-3">
            <div class="col-12">
                <label class="form-label">Endereço do Parceiro</label>
                <textarea type="text" class="form-control" ></textarea>
            </div>
        </div>

        <!-- QUARTA LINHA -->
        <div class="row mb-3">
            <div class="col">
                <label class="form-label">Data de Início do Contrato</label>
                <input type="date" class="form-control">
            </div>

            <div class="col">
                <label class="form-label">Data de Término do Contrato</label>
                <input type="date" class="form-control">
            </div>
        </div>

        <!-- QUINTA LINHA -->
        <div class="row mb-3">
            <div class="col">
                <label class="form-label">Valor Mínimo do Empréstimo</label>
                <input type="number" class="form-control">
            </div>

            <div class="col">
                <label class="form-label">Valor Máximo do Empréstimo</label>
                <input type="number" class="form-control">
            </div>
        </div>

        <!-- SEXTA LINHA -->
        <div class="row mb-4">
            <div class="col">
                <label class="form-label">Taxa de Juros</label>
                <input type="number" step="any" class="form-control">
            </div>

            <div class="col">
                <label class="form-label">Valor do Depósito</label>
                <input type="number" step="any" class="form-control">
            </div>
        </div>

        <!-- ÚLTIMA LINHA - BOTÃO CENTRALIZADO -->
        <div class="row">
            <div class="col text-center">
                <button type="button" class="btn btn-success px-5">
                    Salvar
                </button>
            </div>
        </div>

    </form>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
