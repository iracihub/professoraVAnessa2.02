<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulário</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <h2 class="mb-4">Novo Usuário</h2>

    <form>

        <!-- PRIMEIRA LINHA -->
        <div class="row mb-3">
            <div class="col-12">
                <label class="form-label fw-semibold">Nome:</label>
                <input type="text" class="form-control" placeholder="Informe o nome...">
            </div>
        </div>

        <!-- SEGUNDA LINHA -->
        <div class="row mb-3">
            <div class="col-3">
                <label class="form-label fw-semibold">CPF:</label>
                <input type="text" class="form-control" placeholder="Informe o cpf...">
            </div>

            <div class="col-6">
                <label class="form-label fw-semibold">Endereço:</label>
                <input type="text" class="form-control" placeholder="Informe o endereço...">
            </div>

            <div class="col-3">
                <label class="form-label fw-semibold">Nível:</label>
                <select class="form-select">
                    <option value="">---</option>
                </select>
            </div>
        </div>

        <!-- TERCEIRA LINHA -->
        <div class="row mb-3">
            <div class="col-5">
                <label class="form-label fw-semibold">Email:</label>
                <input type="email" class="form-control" placeholder="Informe o email...">
            </div>

            <div class="col-4">
                <label class="form-label fw-semibold">Senha:</label>
                <input type="password" class="form-control" placeholder="Informe a senha...">
            </div>

            <div class="col-3">
                <label class="form-label fw-semibold">Status:</label>
                <select class="form-select">
                    <option value="">---</option>
                </select>
            </div>
        </div>

        <!-- QUARTA LINHA (BOTÕES) -->
        <div class="row">
            <div class="col d-flex justify-content-end gap-2">
                <button type="submit" class="btn btn-success">Enviar</button>
                <button type="reset" class="btn btn-light border">Cancelar</button>
            </div>
        </div>

    </form>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
