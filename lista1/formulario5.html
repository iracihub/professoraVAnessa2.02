<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Endereço de Cobrança</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <h3 class="mb-3 text-start">Endereço de Cobrança</h3>

    <form>

        <!-- LINHA 1 -->
        <div class="row mb-3">
            <div class="col">
                <label class="form-label">Nome</label>
                <input type="text" class="form-control">
            </div>
            <div class="col">
                <label class="form-label">Sobrenome</label>
                <input type="text" class="form-control">
            </div>
        </div>

        <!-- LINHA 2 -->
        <div class="mb-3">
            <label class="form-label">Nome de Usuário</label>
            <div class="input-group">
                <span class="input-group-text">@</span>
                <input type="text" class="form-control" placeholder="Nome de usuário">
            </div>
        </div>

        <!-- LINHA 3 -->
        <div class="mb-3">
            <label class="form-label">E-mail <span class="text-muted fw-normal">(Opcional)</span></label>
            <input type="email" class="form-control" placeholder="voce@exemplo.com">
        </div>

        <!-- LINHA 4 -->
        <div class="mb-3">
            <label class="form-label">Endereço</label>
            <input type="text" class="form-control" placeholder="Rua Principal, 1234">
        </div>

        <!-- LINHA 5 -->
        <div class="mb-3">
            <label class="form-label">Endereço 2 <span class="text-muted fw-normal">(Opcional)</span></label>
            <input type="text" class="form-control" placeholder="Apartamento ou conjunto">
        </div>

        <!-- LINHA 6 -->
        <div class="row mb-4">
            <div class="col-5">
                <label class="form-label">País</label>
                <select class="form-select">
                    <option selected>Escolha...</option>
                </select>
            </div>
            <div class="col-4">
                <label class="form-label">Estado</label>
                <select class="form-select">
                    <option selected>Escolha...</option>
                </select>
            </div>
            <div class="col-3">
                <label class="form-label">CEP</label>
                <input type="text" class="form-control">
            </div>
        </div>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
